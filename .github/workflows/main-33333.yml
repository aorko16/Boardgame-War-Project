name: Artifact Jar Storing Nexus Repository
on:
  push:
    branches: [ "main" ]

jobs:
  pre_build:
    name: Pre-compile Project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Compile & Test
        run: |
          mvn compile
          mvn test

  build:
    name: Deploy to Nexus
    runs-on: ubuntu-latest
    needs: pre_build
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17 & Configure Nexus
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          server-id: nexus                   # must match <id> in pom.xml
          server-username: ${{ secrets.NEXUS_USERNAME }}
          server-password: ${{ secrets.NEXUS_PASSWORD }}
      - name: Deploy artifact
        run: |
          # Determine if version is a SNAPSHOT or RELEASE
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          if [[ "$VERSION" == *"-SNAPSHOT" ]]; then
            echo "Deploying SNAPSHOT to Nexus..."
            mvn deploy -DaltDeploymentRepository=nexus::default::http://13.203.65.11:8081/repository/maven-snapshots/
          else
            echo "Deploying RELEASE to Nexus..."
            mvn deploy -DaltDeploymentRepository=nexus::default::http://13.203.65.11:8081/repository/maven-releases/
          fi
