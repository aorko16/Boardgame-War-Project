name: Build and Deploy WAR to Nexus

on:
  push:
    branches:
      - main
      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17 + Maven + Nexus credentials
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'           # Eclipse Temurin (most popular & reliable)
          cache: maven
          server-id: nexus                  # ← Must match the <id> in your pom.xml <distributionManagement>
          server-username: NEXUS_USERNAME
          server-password: NEXUS_PASSWORD

      # Optional: show effective settings.xml (good for debugging)
      - name: Show Maven settings (debug)
        run: cat ~/.m2/settings.xml || true

      - name: Build WAR + Deploy to Nexus
        run: mvn --batch-mode clean deploy
        env:
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}

      # Optional: upload the .war file as GitHub artifact (nice for manual download / verification)
      - name: Upload WAR artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: my-app-war
          path: target/*.war
          retention-days: 7
